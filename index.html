<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="SIM KBM Ustaz V2.0 - Sistem Informasi Manajemen Kegiatan Belajar Mengajar Madrasah" />
    <title>SIM KBM Ustaz</title>

    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SIM KBM" />

    <meta property="og:title" content="SIM KBM Ustaz" />
    <meta property="og:description" content="Sistem Informasi Manajemen Kegiatan Belajar Mengajar Madrasah" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <!-- Console Darurat -->
    <div id="debug-console" style="position:fixed; bottom:0; left:0; width:100%; background:black; color:lime; padding:10px; font-family:monospace; font-size:12px; z-index:9999; max-height:200px; overflow-y:auto; border-top:2px solid red;">
      <strong>Debug Console:</strong>
    </div>
    <script>
      window.onerror = function(msg, url, line) {
        document.getElementById('debug-console').innerHTML += '<br>> ' + msg + ' (Line: ' + line + ')';
      };
    </script>
    <!-- End of Console Darurat -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            document.getElementById('debug-console').innerHTML += '<br>> SW Error: ' + err;
          });
        });
      }
    </script>
  </body>
</html>
