<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Book -->
  <rect x="20" y="55" width="60" height="32" rx="4" fill="white"/>
  <rect x="24" y="59" width="52" height="24" rx="2" fill="#f1f5f9"/>
  <rect x="20" y="55" width="5" height="32" rx="2" fill="#e2e8f0"/>
  <line x1="28" y1="67" x2="72" y2="67" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="28" y1="73" x2="72" y2="73" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Dome -->
  <ellipse cx="50" cy="38" rx="22" ry="18" fill="url(#dome)"/>
  <rect x="32" y="34" width="36" height="22" fill="url(#dome)"/>

  <!-- Crescent -->
  <circle cx="50" cy="22" r="6" fill="#fcd34d"/>
  <circle cx="53" cy="20" r="4.5" fill="url(#dome)"/>

  <!-- Star -->
  <polygon points="50,45 51,48 54,48 52,50 53,53 50,51 47,53 48,50 46,48 49,48" fill="#fcd34d" transform="scale(0.8) translate(12.5,15)"/>
</svg>