<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Decorative pattern -->
  <circle cx="160" cy="32" r="60" fill="white" opacity="0.05"/>
  <circle cx="32" cy="160" r="60" fill="white" opacity="0.05"/>

  <!-- Book base -->
  <g filter="url(#shadow)">
    <rect x="36" y="100" width="120" height="60" rx="6" fill="white"/>
    <rect x="42" y="106" width="108" height="48" rx="3" fill="#f1f5f9"/>

    <!-- Book spine -->
    <rect x="36" y="100" width="8" height="60" rx="3" fill="#e2e8f0"/>

    <!-- Book pages -->
    <line x1="50" y1="115" x2="144" y2="115" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="50" y1="125" x2="144" y2="125" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="50" y1="135" x2="120" y2="135" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <!-- Dome/Madrasah symbol -->
  <g filter="url(#shadow)">
    <ellipse cx="96" cy="75" rx="45" ry="35" fill="url(#dome)"/>
    <rect x="60" y="70" width="72" height="35" fill="url(#dome)"/>

    <!-- Dome top -->
    <circle cx="96" cy="42" r="8" fill="#fcd34d"/>
    <path d="M88 42 Q96 30 104 42" fill="url(#dome)" stroke="#fcd34d" stroke-width="2"/>
  </g>

  <!-- Star decoration -->
  <g fill="#fcd34d">
    <polygon points="96,55 98,61 104,61 99,65 101,71 96,67 91,71 93,65 88,61 94,61" transform="scale(0.6) translate(64,30)"/>
  </g>

  <!-- Small decorative elements -->
  <circle cx="70" y="90" r="2" fill="#059669" opacity="0.6"/>
  <circle cx="122" y="90" r="2" fill="#059669" opacity="0.6"/>
</svg>