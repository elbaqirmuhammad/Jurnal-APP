<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="92" r="150" fill="white" opacity="0.04"/>
  <circle cx="92" cy="420" r="150" fill="white" opacity="0.04"/>
  <circle cx="256" cy="256" r="200" fill="white" opacity="0.02"/>

  <!-- Book base -->
  <g filter="url(#shadow)">
    <rect x="96" y="270" width="320" height="160" rx="16" fill="white"/>
    <rect x="112" y="286" width="288" height="128" rx="8" fill="#f8fafc"/>

    <!-- Book spine -->
    <rect x="96" y="270" width="20" height="160" rx="8" fill="#e2e8f0"/>

    <!-- Book pages lines -->
    <line x1="132" y1="310" x2="384" y2="310" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="132" y1="338" x2="384" y2="338" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="132" y1="366" x2="320" y2="366" stroke="#cbd5e1" stroke-width="3"/>

    <!-- Bookmark -->
    <path d="M350 270 L350 320 L365 305 L380 320 L380 270" fill="#ef4444"/>
  </g>

  <!-- Madrasah dome -->
  <g filter="url(#shadow)">
    <ellipse cx="256" cy="180" rx="120" ry="95" fill="url(#dome)"/>
    <rect x="156" y="165" width="200" height="95" fill="url(#dome)"/>

    <!-- Dome top crescent base -->
    <circle cx="256" cy="92" r="20" fill="#fcd34d"/>
    <ellipse cx="256" cy="88" rx="28" ry="18" fill="url(#dome)"/>

    <!-- Crescent moon -->
    <g filter="url(#glow)">
      <circle cx="256" cy="75" r="14" fill="#fcd34d"/>
      <circle cx="262" cy="72" r="11" fill="url(#dome)"/>
    </g>
  </g>

  <!-- Star decorations -->
  <g fill="#fcd34d" filter="url(#glow)">
    <polygon points="256,120 260,132 272,132 262,140 266,152 256,144 246,152 250,140 240,132 252,132"/>
  </g>

  <!-- Small stars -->
  <g fill="white" opacity="0.8">
    <circle cx="180" cy="240" r="4"/>
    <circle cx="332" cy="240" r="4"/>
    <circle cx="200" cy="100" r="3"/>
    <circle cx="312" cy="100" r="3"/>
  </g>

  <!-- Decorative arch windows on dome -->
  <g opacity="0.3">
    <ellipse cx="200" cy="200" rx="20" ry="30" fill="#059669"/>
    <ellipse cx="256" cy="200" rx="20" ry="30" fill="#059669"/>
    <ellipse cx="312" cy="200" rx="20" ry="30" fill="#059669"/>
  </g>
</svg>